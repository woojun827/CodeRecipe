<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>save</title>
</head>
<body>
<!-- action 속성: form에 작성한 데이터를 어디로 보낼지 지정
 get과 post의 차이는 주소창에 내가 보내는 데이터가 보이느냐-->
<form action="/member/save" method="post">
  <!-- name속성: 서버로 전송할 때 변수이름의 역할,
  사용자가 작성한 이메일 정보가 memberEmail이란 변수에 담긴다! -->
  이메일: <input type="text" name="memberEmail"> <br>
  비밀번호: <input type="password" name="memberPassword"> <br>
  이름: <input type="text" name="memberName"> <br>
  <input type="submit" value="회원가입">
  <!-- submit 입력하면 버튼처럼 보이고, 버튼 누르면 위에 input에 입력한 값 가지고
  post로 member/save에 전송-->
</form>
</body>
</html>
